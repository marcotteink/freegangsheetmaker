<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b1f28"/>
      <stop offset="0.55" stop-color="#0c0d10"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="1200" fill="url(#bg)"/>

  <!-- content centered in the middle 630px band (y 285..915) -->
  <g transform="translate(0,285)">
    <!-- gang-sheet layout motif (right side) -->
    <g opacity="0.16">
      <rect x="840" y="60"  width="140" height="105" rx="10" fill="#3fb6ff"/>
      <rect x="995" y="60"  width="125" height="70"  rx="10" fill="#ffd23f"/>
      <rect x="995" y="145" width="125" height="115" rx="10" fill="#46d39a"/>
      <rect x="840" y="180" width="90"  height="90"  rx="10" fill="#ffd23f"/>
      <rect x="945" y="275" width="175" height="85"  rx="10" fill="#3fb6ff"/>
      <rect x="840" y="285" width="90"  height="150" rx="10" fill="#46d39a"/>
      <rect x="945" y="375" width="85"  height="85"  rx="10" fill="#ffd23f"/>
      <rect x="1045" y="375" width="75" height="160" rx="10" fill="#3fb6ff"/>
      <rect x="840" y="450" width="190" height="85"  rx="10" fill="#46d39a"/>
    </g>

    <!-- brand bolt + domain -->
    <path d="M118 60 L74 120 H104 L98 170 L142 100 H112 Z" fill="#ffd23f"/>
    <text x="160" y="108" font-size="26" font-weight="700" fill="#9aa3b2" letter-spacing="1">freegangsheetmaker.com</text>

    <!-- headline -->
    <text x="80" y="250" font-size="74" font-weight="800" fill="#eef0f4">The <tspan fill="#ffd23f">free</tspan> DTF gang</text>
    <text x="80" y="335" font-size="74" font-weight="800" fill="#eef0f4">sheet maker</text>

    <!-- subhead -->
    <text x="82" y="398" font-size="29" fill="#c7ccd6">Pack transparent PNGs into a print-ready 300 DPI</text>
    <text x="82" y="437" font-size="29" fill="#c7ccd6">sheet — with the least wasted film.</text>

    <!-- badges -->
    <g font-size="22" font-weight="700">
      <rect x="80"  y="488" width="166" height="46" rx="23" fill="#ffd23f"/>
      <text x="163" y="518" fill="#1a1500" text-anchor="middle">100% FREE</text>
      <rect x="262" y="488" width="190" height="46" rx="23" fill="none" stroke="#2a2e37" stroke-width="2"/>
      <text x="357" y="518" fill="#9aa3b2" text-anchor="middle">NO ACCOUNT</text>
      <rect x="468" y="488" width="142" height="46" rx="23" fill="none" stroke="#2a2e37" stroke-width="2"/>
      <text x="539" y="518" fill="#9aa3b2" text-anchor="middle">300 DPI</text>
      <rect x="626" y="488" width="146" height="46" rx="23" fill="none" stroke="#2a2e37" stroke-width="2"/>
      <text x="699" y="518" fill="#9aa3b2" text-anchor="middle">PRIVATE</text>
    </g>
  </g>
</svg>
